name: Python Integration (Firebase Emulators)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  python-integration-tests:
    name: Cloud Functions → Firestore (emulators)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      FIREBASE_PROJECT: coach-app-demo-3132026
      FUNCTION_REGION: us-central1
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            cloud-functions/functions/requirements.txt
            cloud-functions/functions/requirements-dev.txt

      - name: Create Python virtualenv
        working-directory: cloud-functions/functions
        run: python -m venv venv

      - name: Install Python dependencies
        working-directory: cloud-functions/functions
        run: |
          . venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Python integration tests against emulators
        working-directory: cloud-functions
        env:
          CI: 'true'
        run: |
          firebase emulators:exec \
            --project "$FIREBASE_PROJECT" \
            --only functions,firestore \
            "functions/venv/bin/python -m pytest -q functions/tests/integration"
