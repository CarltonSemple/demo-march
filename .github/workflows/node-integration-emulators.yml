name: Node Integration (Firebase Emulators)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  node-integration-tests:
    name: Express → Firebase Functions emulator
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      FIREBASE_PROJECT: coach-app-demo-3132026
      FUNCTION_REGION: us-central1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: coach-mini-app/server/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            cloud-functions/functions/requirements.txt
            cloud-functions/functions/requirements-dev.txt

      - name: Create Python virtualenv
        working-directory: cloud-functions/functions
        run: python -m venv venv

      - name: Install Python dependencies (Cloud Functions)
        working-directory: cloud-functions/functions
        run: |
          . venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install server dependencies
        working-directory: coach-mini-app/server
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Run Express integration tests against emulators
        working-directory: cloud-functions
        env:
          CI: 'true'
          PY_FUNCTION_BASE_URL: http://127.0.0.1:5001/coach-app-demo-3132026/us-central1
        run: |
          firebase emulators:exec \
            --project "$FIREBASE_PROJECT" \
            --only functions,firestore \
            "npm --prefix ../coach-mini-app/server test"
